      <div class="logo"><span class="dot"></span> Obsidian</div>
      <nav class="nav">

<a class="nav-item" href="../index.html">Overview</a>

    <main class="content">
      <div class="header">
        <h1>Alchemy</h1>
        <span class="badge">v1.0</span>
      </div>
      <section class="section"><h2>Profit Calculator</h2><div class="form-grid">
  <div class="field"><label>Item ID</label><input id="alchemy-item-id" type="text" placeholder="T4_BAG" /></div>
  <div class="field"><label>City</label><input id="alchemy-city" type="text" value="Bridgewatch" /></div>
  <div class="field"><label>Return Rate %</label><input id="alchemy-return-rate" type="number" value="15" /></div>
  <div class="field"><label>Crafting Fee %</label><input id="alchemy-fee" type="number" value="6" /></div>
  <div class="field"><label>Bonus %</label><input id="alchemy-bonus" type="number" value="0" /></div>
  <div class="field"><label>Materials (item, qty, unit cost optional)</label><textarea id="alchemy-materials" rows="4" placeholder="T4_METALBAR,16
T4_LEATHER,8"></textarea></div>
</div>
<div style="margin-top:10px"><button id="alchemy-calc" class="btn">Calculate</button></div>
<pre id="alchemy-output" class="card"></pre></section>
<section class="section"><h2>Save Scenario</h2><div class="form-grid">
  <div class="field"><label>Name</label><input id="alchemy-scenario-name" type="text" placeholder="Bridgewatch Bags" /></div>
</div>
<div style="margin-top:10px"><button id="alchemy-save" class="btn">Save Scenario</button> <button id="alchemy-refresh" class="btn">Refresh Scenarios</button></div>
<pre id="alchemy-scenarios-output" class="card"></pre></section>
      <div class="footer">Obsidian UI — undead ritual v1 draft</div>
    </main>
  </div>
  <script src="../app.js"></script>
